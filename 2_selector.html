<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 
<link rel="stylesheet" href="2_selector.css">
</head>
<body>
    <!-- CSS element Selector -->
    <!-- The element selector selects HTML elements based on the element name -->
     <p> I am Amresh Kumar</p>
     <p>Hi Everyone</p>
     <p id="name"> Welcome to sit Sitamarhi </p>
     <hr>
     <!-- CSS id Selector start with (#) -->
      <p id="select"> The id selector uses the id attribute of an HTML element to select a specific element.
</p>
<hr>

<!-- class Selector start with (.) -->
 <h1 class="first">Hello Everyone</h1>
 <p class="first">The class selector selects HTML elements with a specific class attribute.

</p>


</body>
</html>
